<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Sistema Digital de Pases · Inicio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #eef2f9 0%, #d9e2ef 100%);
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-height: 100vh;
            padding: 1.5rem 2rem 1rem 2rem;
        }

        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(25, 118, 210, 0.15);
            margin-bottom: 1.2rem;
            flex-shrink: 0;
        }

        .app-header .brand h1 {
            font-weight: 700;
            font-size: 1.8rem;
            color: #0a2a44;
            margin: 0;
            letter-spacing: -0.5px;
        }
        .app-header .brand small {
            font-size: 0.85rem;
            color: #5f7f9f;
            display: block;
            font-weight: 400;
            margin-top: -2px;
        }

        .btn-back {
            background: rgba(25, 118, 210, 0.08);
            border: 1px solid #d0e0f0;
            color: #0a2a44;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.2s;
            cursor: pointer;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .btn-back:hover {
            background: #1976d2;
            color: #fff;
            border-color: #1976d2;
        }

        .main-content {
            flex: 1;
            position: relative;
            overflow: hidden;
            border-radius: 28px;
            background: #ffffff;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(25, 118, 210, 0.08);
        }

        /* --- GRID VIEW --- */
        .grid-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 2rem;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .grid-view.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            position: absolute;
            width: 100%;
        }

        .launcher-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.2rem;
            width: 80%; /* Ocupa exactamente el 80% de la pantalla de escritorio */
            max-width: none; 
        }

        .module-card {
            background: #ffffff;
            border-radius: 32px;
            padding: 3rem 2rem;
            text-align: center;
            text-decoration: none;
            color: #0a2a44;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06), 0 4px 12px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(25, 118, 210, 0.10);
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 260px;
            cursor: pointer;
        }
        .module-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 8px 20px rgba(0, 0, 0, 0.02);
            border-color: #1976d2;
            background: #f9fcff;
        }
        .module-card i {
            font-size: 4.5rem;
            margin-bottom: 1rem;
            transition: transform 0.2s;
        }
        .module-card:hover i {
            transform: scale(1.05);
        }
        .module-card .card-title {
            font-weight: 700;
            font-size: 1.6rem;
            margin-bottom: 0.4rem;
            color: #0a2a44;
        }
        .module-card .card-sub {
            font-size: 0.95rem;
            color: #5f7f9f;
            font-weight: 400;
        }

        /* Colores distintivos por módulo */
        .module-card.operador i { color: #1976d2; }
        .module-card.empleados i { color: #2e7d32; }

        .module-card.operador { border-left: 4px solid #1976d2; }
        .module-card.empleados { border-left: 4px solid #2e7d32; }

        /* --- IFRAME VIEW --- */
        .iframe-view {
            display: none;
            height: 100%;
            width: 100%;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .iframe-view.active {
            display: block;
            opacity: 1;
        }
        .iframe-view iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 0 0 28px 28px;
            background: #fff;
        }

        .app-footer {
            flex-shrink: 0;
            text-align: center;
            font-size: 0.75rem;
            color: #8aa3bc;
            padding-top: 0.8rem;
            margin-top: 0.5rem;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 576px) {
            .app-container {
                padding: 0.8rem 0.8rem 0.5rem 0.8rem;
            }
            .app-header .brand h1 {
                font-size: 1.4rem;
            }
            .app-header .brand small {
                font-size: 0.75rem;
            }
            .launcher-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
                max-width: 340px;
                width: 100%; /* Restablece el ancho en móviles */
            }
            .module-card {
                min-height: 140px;
                padding: 1.2rem 1rem;
            }
            .module-card i {
                font-size: 2.8rem;
            }
            .module-card .card-title {
                font-size: 1.1rem;
            }
            .main-content {
                border-radius: 18px;
            }
            .btn-back {
                font-size: 0.75rem;
                padding: 4px 14px;
            }
        }

        @media (min-width: 577px) and (max-width: 768px) {
            .launcher-grid {
                gap: 1.4rem;
                max-width: 600px;
                width: 100%; /* Restablece el ancho en tablets */
            }
            .module-card {
                min-height: 170px;
                padding: 2rem 1.5rem;
            }
            .module-card i {
                font-size: 3.8rem;
            }
            .module-card .card-title {
                font-size: 1.35rem;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">

        <header class="app-header">
            <div class="brand">
                <h1><i class="bi bi-shield-check" style="color:#1976d2; margin-right: 6px;"></i>Sistema Digital de Pases</h1>
                <small>Defensoría Oficial Civil y Comercial 6</small>
            </div>
            <button class="btn-back" id="btnVolver">
                <i class="bi bi-arrow-left"></i> Volver al inicio
            </button>
        </header>

        <div class="main-content">

            <div class="grid-view" id="gridView">
                <div class="launcher-grid">

                    <div class="module-card operador" data-url="operador.html">
                        <i class="bi bi-inbox"></i>
                        <div class="card-title">Operador</div>
                        <div class="card-sub">Registro de Entrada y Salida de causas</div>
                    </div>

                    <div class="module-card empleados" data-url="empleado.html">
                        <i class="bi bi-person-check"></i>
                        <div class="card-title">Empleados</div>
                        <div class="card-sub">Visualización de tareas asignadas</div>
                    </div>

                </div>
            </div>

            <div class="iframe-view" id="iframeView">
                <iframe id="moduleFrame" src="" title="Módulo del sistema"></iframe>
            </div>

        </div>

        <footer class="app-footer">
            <i class="bi bi-database"></i>Sistema Unificado Defensoria Civil y Comercial 6 · <span id="fechaActual"></span>
        </footer>

    </div>

    <script>
        (function() {
            const gridView = document.getElementById('gridView');
            const iframeView = document.getElementById('iframeView');
            const moduleFrame = document.getElementById('moduleFrame');
            const btnVolver = document.getElementById('btnVolver');

            function mostrarModulo(url) {
                gridView.classList.add('hidden');
                iframeView.classList.add('active');
                iframeView.style.display = 'block';
                btnVolver.style.display = 'flex';
                moduleFrame.src = url;
            }

            function volverInicio() {
                iframeView.classList.remove('active');
                iframeView.style.display = 'none';
                gridView.classList.remove('hidden');
                btnVolver.style.display = 'none';
                moduleFrame.src = 'about:blank';
            }

            document.querySelectorAll('.module-card').forEach(card => {
                card.addEventListener('click', function(e) {
                    const url = this.dataset.url;
                    if (url) mostrarModulo(url);
                });
            });

            btnVolver.addEventListener('click', volverInicio);

            document.getElementById('fechaActual').textContent = new Date().toLocaleDateString('es-AR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && btnVolver.style.display === 'flex') {
                    volverInicio();
                }
            });
        })();
    </script>

</body>
</html>
